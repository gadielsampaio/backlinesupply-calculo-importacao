<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://t4.ftcdn.net/jpg/04/11/39/77/360_F_411397771_TYwKZCENTf7RJUuxll4tqjrxbkvkAC9U.jpg" type="image/x-icon">
    <title>Calculadora de Custo de Importação</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8 min-h-screen selection:bg-indigo-200">

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <div class="lg:col-span-4 bg-white p-6 md:p-8 rounded-3xl shadow-[0_2px_20px_rgb(0,0,0,0.04)] border border-slate-100 h-fit">
                <header class="mb-10 text-center md:text-left">
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">Backline Supply Co.</h1>
                    <p class="text-slate-500 mt-2 text-lg">Custos, Taxas, Frete e Margem.</p>
                </header>
                <h2 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">Parâmetros</h2>
                
                <form id="calcForm" class="space-y-5 text-sm">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Produto (USD)</label>
                            <input type="text" inputmode="numeric" id="valUsd" value="0,00"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Peso (kg)</label>
                            <input type="text" inputmode="numeric" id="peso" value="10,00"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Dól. Turismo (R$)</label>
                            <input type="text" inputmode="numeric" id="dolTurismo" value="5,30"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Dól. Banco (R$)</label>
                            <input type="text" inputmode="numeric" id="dolBanco" value="5,26"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Aéreo (USD/kg)</label>
                            <input type="text" inputmode="numeric" id="freteAereo" value="21,00"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Marítimo (USD/kg)</label>
                            <input type="text" inputmode="numeric" id="freteMar" value="11,00"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Assistida (%)</label>
                            <input type="text" inputmode="numeric" id="taxaAssistida" value="10,00"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Lucro Base (%)</label>
                            <input type="text" inputmode="numeric" id="margemLucro" value="30,00"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium text-right transition-colors">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5" title="Aplicado se o produto custar até $999,99">Taxa Fixa < $1k (USD)</label>
                            <input type="text" inputmode="numeric" id="taxaFixaUsd" value="50,00"
                                class="w-full bg-amber-50/50 border border-amber-200/60 rounded-xl p-3 focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none text-amber-900 font-medium text-right transition-colors">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5" title="Aplicado se o produto custar $1000 ou mais">Taxa Extra ≥ $1k (%)</label>
                            <input type="text" inputmode="numeric" id="taxaExtraPerc" value="10,00"
                                class="w-full bg-amber-50/50 border border-amber-200/60 rounded-xl p-3 focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none text-amber-900 font-medium text-right transition-colors">
                        </div>
                    </div>
                </form>

                <div class="mt-8 bg-indigo-50/50 border border-indigo-100 rounded-2xl p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-indigo-900 uppercase tracking-wider flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            Calendário de Embarques
                        </h3>
                        <span id="mesAtualRef" class="text-xs font-bold bg-indigo-200/50 text-indigo-700 px-2 py-1 rounded">Mês Atual</span>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex items-start gap-3">
                            <span class="text-2xl leading-none">✈️</span>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">Aéreo <span class="font-normal text-slate-500">(Terças e Sextas)</span></p>
                                <p id="datasAereo" class="text-[13px] font-medium text-indigo-600 mt-0.5">Calculando...</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3">
                            <span class="text-2xl leading-none">🚢</span>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">Marítimo <span class="font-normal text-slate-500">(Quartas)</span></p>
                                <p id="datasMaritimo" class="text-[13px] font-medium text-indigo-600 mt-0.5">Calculando...</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-[0_2px_20px_rgb(0,0,0,0.04)] border border-slate-100">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">Detalhamento dos Cenários</h2>
                    <div id="scenariosContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const formatBRL = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        const formatNumber = (value) => new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);

        const parseMaskedValue = (id) => {
            const el = document.getElementById(id);
            if (!el) return 0;
            const strValue = el.value.replace(/\./g, '').replace(',', '.');
            return parseFloat(strValue) || 0;
        };

        window.setCursorToEnd = (input) => {
            setTimeout(() => {
                if (typeof input.selectionStart == "number") {
                    input.selectionStart = input.selectionEnd = input.value.length;
                }
            }, 0);
        };

        window.preventArrowKeys = (event) => {
            if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(event.key)) {
                event.preventDefault();
            }
        };

        const applyMask = (event) => {
            const input = event.target;
            let valueStr = input.value.replace(/\D/g, ""); 
            
            if (valueStr === "") valueStr = "0";
            
            const floatValue = parseInt(valueStr, 10) / 100;
            input.value = formatNumber(floatValue);

            setCursorToEnd(input);
        };

        window.handleCustomPriceInput = (event, id, totalCost) => {
            applyMask(event);
            
            const newPriceStr = event.target.value.replace(/\./g, '').replace(',', '.');
            const newPrice = parseFloat(newPriceStr) || 0;
            
            const newProfit = newPrice - totalCost;
            const newMargin = totalCost > 0 ? (newProfit / totalCost) * 100 : 0;

            document.getElementById(`lucro-val-${id}`).innerText = formatBRL(newProfit);
            document.getElementById(`margem-val-${id}`).innerText = `(${newMargin.toFixed(1)}%)`;

            const profitContainer = document.getElementById(`lucro-container-${id}`);
            if (newProfit < 0) {
                profitContainer.className = "flex justify-between items-center text-red-600 font-medium bg-red-50/80 -mx-2 px-2 py-1.5 rounded transition-colors mt-2";
            } else {
                profitContainer.className = "flex justify-between items-center text-indigo-700 font-medium bg-indigo-50/80 -mx-2 px-2 py-1.5 rounded transition-colors mt-2";
            }
        };

        // --- FUNÇÃO PARA CALCULAR DATAS DOS EMBARQUES ---
        const calcularDatasEmbarque = () => {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = hoje.getMonth(); // 0 a 11
            
            // Nomes dos meses para exibir no badge
            const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('mesAtualRef').innerText = nomesMeses[mes];

            // Quantos dias tem no mês atual?
            const diasNoMes = new Date(ano, mes + 1, 0).getDate();

            let aereoDatas = []; // Terças (2) e Sextas (5)
            let maritimoDatas = []; // Quartas (3)

            for (let dia = 1; dia <= diasNoMes; dia++) {
                const data = new Date(ano, mes, dia);
                const diaSemana = data.getDay(); // 0 = Dom, 1 = Seg, 2 = Ter, 3 = Qua, 4 = Qui, 5 = Sex, 6 = Sab

                // Adiciona zero à esquerda se for menor que 10
                const diaFormatado = dia < 10 ? `0${dia}` : `${dia}`;

                if (diaSemana === 2 || diaSemana === 5) {
                    aereoDatas.push(diaFormatado);
                }
                
                if (diaSemana === 3) {
                    maritimoDatas.push(diaFormatado);
                }
            }

            // Formata as strings finais
            document.getElementById('datasAereo').innerText = `Dias: ${aereoDatas.join(', ')}`;
            document.getElementById('datasMaritimo').innerText = `Dias: ${maritimoDatas.join(' e ')}`;
        };


        const calculateScenarios = () => {
            const valUsd = parseMaskedValue('valUsd');
            const peso = parseMaskedValue('peso');
            const dolTurismo = parseMaskedValue('dolTurismo');
            const dolBanco = parseMaskedValue('dolBanco');
            const freteAereoUsd = parseMaskedValue('freteAereo');
            const freteMarUsd = parseMaskedValue('freteMar');
            const taxaAssistida = parseMaskedValue('taxaAssistida');
            const margemLucro = parseMaskedValue('margemLucro');
            
            const taxaFixaUsd = parseMaskedValue('taxaFixaUsd');
            const taxaExtraPerc = parseMaskedValue('taxaExtraPerc');

            let scenarios = [];

            const freteAereoBrl = (peso * freteAereoUsd) * dolTurismo;
            const freteMarBrl = (peso * freteMarUsd) * dolTurismo;
            const prodCartao = valUsd * dolBanco;
            const prodAssistida = valUsd * dolTurismo;

            let taxasExtrasBrl = 0;
            let labelTaxa = "";

            if (valUsd >= 1000) {
                const taxaExtraUsd = valUsd * (taxaExtraPerc / 100);
                taxasExtrasBrl = taxaExtraUsd * dolTurismo;
                labelTaxa = `Taxa Extra (${taxaExtraPerc}%)`;
            } else if (valUsd > 0) {
                taxasExtrasBrl = taxaFixaUsd * dolTurismo;
                labelTaxa = `Taxa Fixa ($${formatNumber(taxaFixaUsd)})`;
            }

            scenarios.push({ id: 1, name: "Cartão + Aéreo ✈️", prodCost: prodCartao, assistFee: 0, freight: freteAereoBrl, extraFees: taxasExtrasBrl, labelTaxa: labelTaxa });
            scenarios.push({ id: 2, name: "Cartão + Marítimo 🚢", prodCost: prodCartao, assistFee: 0, freight: freteMarBrl, extraFees: taxasExtrasBrl, labelTaxa: labelTaxa });
            scenarios.push({ id: 3, name: "Assistida + Aéreo ✈️", prodCost: prodAssistida, assistFee: prodAssistida * (taxaAssistida / 100), freight: freteAereoBrl, extraFees: taxasExtrasBrl, labelTaxa: labelTaxa });
            scenarios.push({ id: 4, name: "Assistida + Marítimo 🚢", prodCost: prodAssistida, assistFee: prodAssistida * (taxaAssistida / 100), freight: freteMarBrl, extraFees: taxasExtrasBrl, labelTaxa: labelTaxa });

            scenarios = scenarios.map(s => {
                s.totalCost = s.prodCost + s.assistFee + s.freight + s.extraFees;
                s.profit = s.totalCost * (margemLucro / 100);
                s.finalPrice = s.totalCost + s.profit;
                return s;
            });

            renderCards(scenarios, margemLucro);
        };

        const renderCards = (scenarios, margemLucro) => {
            const container = document.getElementById('scenariosContainer');
            container.innerHTML = '';

            scenarios.forEach((s, index) => {
                const formattedFinalPrice = formatNumber(s.finalPrice);

                const taxaHtml = s.extraFees > 0 ? `
                    <li class="flex justify-between items-center text-amber-700/90 font-medium bg-amber-50/50 -mx-2 px-2 py-1 rounded mt-1">
                        <span>${s.labelTaxa}:</span> 
                        <span>${formatBRL(s.extraFees)}</span>
                    </li>
                ` : '';

                const html = `
                    <div class="bg-slate-50/50 rounded-2xl p-5 md:p-6 border border-slate-200 hover:border-indigo-200 hover:shadow-md transition-all duration-300 flex flex-col justify-between group">
                        <div>
                            <div class="flex items-center gap-3 mb-5">
                                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 font-bold text-sm">
                                    ${index + 1}
                                </span>
                                <h3 class="font-bold text-slate-800 text-lg group-hover:text-indigo-600 transition-colors">${s.name}</h3>
                            </div>
                            
                            <ul class="text-[15px] text-slate-600 space-y-2.5 mb-6">
                                <li class="flex justify-between items-center">
                                    <span class="text-slate-500">Custo Produto:</span> 
                                    <span class="font-medium text-slate-700">${formatBRL(s.prodCost)}</span>
                                </li>
                                <li class="flex justify-between items-center">
                                    <span class="text-slate-500">Taxa Assistida:</span> 
                                    <span class="font-medium text-slate-700">${formatBRL(s.assistFee)}</span>
                                </li>
                                <li class="flex justify-between items-center">
                                    <span class="text-slate-500">Frete:</span> 
                                    <span class="font-medium text-slate-700">${formatBRL(s.freight)}</span>
                                </li>
                                ${taxaHtml}
                                <li class="flex justify-between items-center font-bold text-slate-800 mt-4 border-t border-slate-200/80 pt-3">
                                    <span>Custo Total:</span> 
                                    <span>${formatBRL(s.totalCost)}</span>
                                </li>
                                
                                <li id="lucro-container-${s.id}" class="flex justify-between items-center text-indigo-700 font-medium bg-indigo-50/80 -mx-2 px-2 py-1.5 rounded transition-colors mt-2">
                                    <span class="flex items-center gap-1">
                                        Lucro Projetado <span id="margem-val-${s.id}" class="text-xs font-bold opacity-70">(${margemLucro.toFixed(1)}%)</span>:
                                    </span> 
                                    <span id="lucro-val-${s.id}">${formatBRL(s.profit)}</span>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="pt-4 border-t border-slate-200 flex items-center justify-between mt-4">
                            <div class="flex flex-col">
                                <span class="text-xs font-bold tracking-wider text-slate-400 uppercase">Preço Final</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-slate-400 font-bold text-lg">R$</span>
                                <input type="text" inputmode="numeric"
                                       id="venda-${s.id}" 
                                       value="${formattedFinalPrice}" 
                                       onclick="setCursorToEnd(this)"
                                       onfocus="setCursorToEnd(this)"
                                       onkeydown="preventArrowKeys(event)"
                                       oninput="handleCustomPriceInput(event, ${s.id}, ${s.totalCost})"
                                       class="w-32 bg-transparent text-right text-2xl font-bold text-slate-900 tracking-tight border-b-2 border-slate-200 hover:border-indigo-300 focus:border-indigo-600 outline-none transition-colors group-hover:text-indigo-600">
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        };

        const inputs = document.querySelectorAll('#calcForm input');
        inputs.forEach(input => {
            input.addEventListener('input', (event) => {
                applyMask(event);
                calculateScenarios();
            });
            input.addEventListener('click', function() { setCursorToEnd(this); });
            input.addEventListener('focus', function() { setCursorToEnd(this); });
            input.addEventListener('keydown', preventArrowKeys);
        });

        // INICIALIZAÇÃO
        window.onload = () => {
            calcularDatasEmbarque();
            calculateScenarios();
        };

    </script>
</body>
</html>
