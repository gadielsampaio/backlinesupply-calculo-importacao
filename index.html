<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://t4.ftcdn.net/jpg/04/11/39/77/360_F_411397771_TYwKZCENTf7RJUuxll4tqjrxbkvkAC9U.jpg" type="image/x-icon">
    <title>Calculadora de Custo de Importação</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilização suave para os inputs */
        input[type="number"] {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8 min-h-screen selection:bg-indigo-200">

    <div class="max-w-7xl mx-auto">
        <!-- <header class="mb-10 text-center md:text-left">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">Calculadora de Importação</h1>
            <p class="text-slate-500 mt-2 text-lg">Compare os cenários e defina a melhor estratégia para o seu negócio.
            </p>
        </header> -->

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <div
                class="lg:col-span-4 bg-white p-6 md:p-8 rounded-3xl shadow-[0_2px_20px_rgb(0,0,0,0.04)] border border-slate-100 h-fit">
                <header class="mb-10 text-center md:text-left">
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">Backline Supply Co.
                    </h1>
                    <p class="text-slate-500 mt-2 text-lg">Custos, Taxas, Frete e Margem.
                    </p>
                </header>
                <h2 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">Parâmetros</h2>
                <form id="calcForm" class="space-y-5 text-sm">

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Valor do Produto (USD)</label>
                            <input type="number" id="valUsd" step="0.01" value="0"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Peso (kg)</label>
                            <input type="number" id="peso" step="0.1" value="10"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Dólar Turismo (R$)</label>
                            <input type="number" id="dolTurismo" step="0.01" value="5.30"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Dólar Banco (R$)</label>
                            <input type="number" id="dolBanco" step="0.01" value="5.26"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Frete Aéreo (USD/kg)</label>
                            <input type="number" id="freteAereo" step="0.1" value="21"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Frete Marítimo (USD/kg)</label>
                            <input type="number" id="freteMar" step="0.1" value="11"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Taxa Assistida (%)</label>
                            <input type="number" id="taxaAssistida" step="0.1" value="10"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                        <div>
                            <label class="block text-slate-500 font-medium mb-1.5">Margem de Lucro (%)</label>
                            <input type="number" id="margemLucro" step="0.1" value="30"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-slate-700 font-medium">
                        </div>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-8">
                <div
                    class="bg-white p-6 md:p-8 rounded-3xl shadow-[0_2px_20px_rgb(0,0,0,0.04)] border border-slate-100">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">Detalhamento dos
                        Cenários</h2>

                    <div id="scenariosContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Formatar valores para Reais (BRL)
        const formatBRL = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        // Função principal de cálculo
        const calculateScenarios = () => {
            // Pegar valores dos inputs
            const valUsd = parseFloat(document.getElementById('valUsd').value) || 0;
            const peso = parseFloat(document.getElementById('peso').value) || 0;
            const dolTurismo = parseFloat(document.getElementById('dolTurismo').value) || 0;
            const dolBanco = parseFloat(document.getElementById('dolBanco').value) || 0;
            const freteAereoUsd = parseFloat(document.getElementById('freteAereo').value) || 0;
            const freteMarUsd = parseFloat(document.getElementById('freteMar').value) || 0;
            const taxaAssistida = parseFloat(document.getElementById('taxaAssistida').value) || 0;
            const margemLucro = parseFloat(document.getElementById('margemLucro').value) || 0;

            let scenarios = [];

            // Regras baseadas na especificação
            const freteAereoBrl = (peso * freteAereoUsd) * dolTurismo;
            const freteMarBrl = (peso * freteMarUsd) * dolTurismo;
            const prodCartao = valUsd * dolBanco;
            const prodAssistida = valUsd * dolTurismo;

            // CENÁRIO 1: Cartão + Frete Aéreo
            scenarios.push({
                id: 1,
                name: "Cartão + Aéreo ✈️",
                prodCost: prodCartao,
                assistFee: 0,
                freight: freteAereoBrl
            });

            // CENÁRIO 2: Cartão + Frete Marítimo
            scenarios.push({
                id: 2,
                name: "Cartão + Marítimo 🚢",
                prodCost: prodCartao,
                assistFee: 0,
                freight: freteMarBrl
            });

            // CENÁRIO 3: Compra Assistida + Frete Aéreo
            scenarios.push({
                id: 3,
                name: "Assistida + Aéreo ✈️",
                prodCost: prodAssistida,
                assistFee: prodAssistida * (taxaAssistida / 100),
                freight: freteAereoBrl
            });

            // CENÁRIO 4: Compra Assistida + Frete Marítimo
            scenarios.push({
                id: 4,
                name: "Assistida + Marítimo 🚢",
                prodCost: prodAssistida,
                assistFee: prodAssistida * (taxaAssistida / 100),
                freight: freteMarBrl
            });

            // Calcular Totais, Lucros e Preço Final
            scenarios = scenarios.map(s => {
                s.totalCost = s.prodCost + s.assistFee + s.freight;
                s.profit = s.totalCost * (margemLucro / 100);
                s.finalPrice = s.totalCost + s.profit;
                return s;
            });

            renderCards(scenarios);
        };

        const renderCards = (scenarios) => {
            const container = document.getElementById('scenariosContainer');
            container.innerHTML = '';

            scenarios.forEach((s, index) => {
                const html = `
                    <div class="bg-slate-50/50 rounded-2xl p-5 md:p-6 border border-slate-200 hover:border-indigo-200 hover:shadow-md transition-all duration-300 flex flex-col justify-between group">
                        
                        <div>
                            <div class="flex items-center gap-3 mb-5">
                                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 font-bold text-sm">
                                    ${index + 1}
                                </span>
                                <h3 class="font-bold text-slate-800 text-lg group-hover:text-indigo-600 transition-colors">${s.name}</h3>
                            </div>
                            
                            <ul class="text-[15px] text-slate-600 space-y-2.5 mb-6">
                                <li class="flex justify-between items-center">
                                    <span class="text-slate-500">Custo Produto:</span> 
                                    <span class="font-medium text-slate-700">${formatBRL(s.prodCost)}</span>
                                </li>
                                <li class="flex justify-between items-center">
                                    <span class="text-slate-500">Taxa Assistida:</span> 
                                    <span class="font-medium text-slate-700">${formatBRL(s.assistFee)}</span>
                                </li>
                                <li class="flex justify-between items-center">
                                    <span class="text-slate-500">Frete:</span> 
                                    <span class="font-medium text-slate-700">${formatBRL(s.freight)}</span>
                                </li>
                                <li class="flex justify-between items-center font-medium text-slate-800 mt-4 border-t border-slate-200/60 pt-3">
                                    <span>Custo Total:</span> 
                                    <span>${formatBRL(s.totalCost)}</span>
                                </li>
                                <li class="flex justify-between items-center text-indigo-600 font-medium bg-indigo-50/50 -mx-2 px-2 py-1 rounded">
                                    <span>Lucro Projetado:</span> 
                                    <span>${formatBRL(s.profit)}</span>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="pt-4 border-t border-slate-200/80 flex items-end justify-between">
                            <span class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Preço Final</span>
                            <span class="text-2xl font-bold text-slate-900 tracking-tight group-hover:text-indigo-600 transition-colors">${formatBRL(s.finalPrice)}</span>
                        </div>
                        
                    </div>
                `;
                container.innerHTML += html;
            });
        };

        // Adicionar eventos para calcular em tempo real (qualquer mudança em qualquer input)
        const inputs = document.querySelectorAll('#calcForm input');
        inputs.forEach(input => {
            input.addEventListener('input', calculateScenarios);
        });

        // Calcular estado inicial no carregamento da página
        window.onload = calculateScenarios;

    </script>
</body>

</html>
